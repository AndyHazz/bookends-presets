name: Regenerate index.json

on:
  push:
    branches: [main]
    paths:
      - 'presets/**.lua'
      - '.github/scripts/build-index.js'
      - '.github/workflows/regenerate-index.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: regenerate-index
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    # Avoid self-triggering when this workflow itself commits index.json
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebuild index.json from presets/*.lua
        run: node .github/scripts/build-index.js

      - name: Commit if changed
        run: |
          if ! git diff --quiet index.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.json
            git commit -m "chore: regenerate index.json"
            git push
          else
            echo "index.json unchanged"
          fi
